<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Wall Calendar v2 — refined directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  #root { height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>

<!-- Classic family -->
<script type="text/babel" src="v1-classic.jsx"></script>
<script type="text/babel" src="v1b-classic-calm.jsx"></script>
<script type="text/babel" src="v1c-classic-cinematic.jsx"></script>

<!-- Terminal family -->
<script type="text/babel" src="v5-terminal.jsx"></script>
<script type="text/babel" src="v5b-terminal-amber.jsx"></script>
<script type="text/babel" src="v5c-terminal-noc.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const W = 540, H = 960; // 9:16 portrait — half-res of a 1080×1920 wall TV

function Frame({ Component }) {
  return (
    <div style={{ width: W, height: H, position: 'relative', overflow: 'hidden' }}>
      <Component />
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="classic"
        title="Direction A · Classic Agenda"
        subtitle="Hour-by-hour timeline · Inter sans · explore density and treatment"
        gap={48}
      >
        <DCArtboard id="a1" label="A1 · Original" width={W} height={H}>
          <Frame Component={window.V1ClassicAgenda} />
        </DCArtboard>
        <DCArtboard id="a2" label="A2 · Calm (no side panel)" width={W} height={H}>
          <Frame Component={window.V1Calm} />
        </DCArtboard>
        <DCArtboard id="a3" label="A3 · Cinematic (tinted)" width={W} height={H}>
          <Frame Component={window.V1Cinematic} />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="terminal"
        title="Direction B · Terminal"
        subtitle="Monospace dashboard · explore retro vs modern data treatment"
        gap={48}
      >
        <DCArtboard id="b1" label="B1 · Original (green phosphor)" width={W} height={H}>
          <Frame Component={window.V5Terminal} />
        </DCArtboard>
        <DCArtboard id="b2" label="B2 · Amber CRT" width={W} height={H}>
          <Frame Component={window.V5Amber} />
        </DCArtboard>
        <DCArtboard id="b3" label="B3 · NOC dashboard (modern)" width={W} height={H}>
          <Frame Component={window.V5NOC} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
